name: Update README Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          username: petrofi
          card: stats
          path: assets/github-stats.svg
          options: show_icons=true&theme=tokyonight

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          username: petrofi
          card: top-langs
          path: assets/top-langs.svg
          options: layout=compact&theme=tokyonight

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/top-langs.svg
          git diff --staged --quiet || git commit -m "chore: update README stats cards"
          git push
